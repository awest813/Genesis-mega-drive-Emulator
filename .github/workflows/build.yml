name: Build

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore MDTracer.sln

    - name: Build
      run: dotnet build MDTracer.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test MDTracer.sln --no-build --configuration Release --verbosity normal
