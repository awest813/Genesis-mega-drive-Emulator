name: Build

on:
  push:
    branches: [ main, "claude/**", "cursor/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  core-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install portable platform dependencies
      run: sudo apt-get update && sudo apt-get install -y libopenal1 libsdl2-2.0-0

    - name: Restore dependencies
      run: dotnet restore tests/GenesisEmu.Core.Tests/GenesisEmu.Core.Tests.csproj

    - name: Build core and portable platform
      run: dotnet build GenesisEmu.Platform.Portable/GenesisEmu.Platform.Portable.csproj --no-restore --configuration Release

    - name: Test core
      run: dotnet test tests/GenesisEmu.Core.Tests/GenesisEmu.Core.Tests.csproj --configuration Release --verbosity normal

  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore MDTracer.sln

    - name: Build
      run: dotnet build MDTracer.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test tests/GenesisEmu.Core.Tests/GenesisEmu.Core.Tests.csproj --no-build --configuration Release --verbosity normal
